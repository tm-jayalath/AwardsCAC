<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAC Excellence Awards - 2026</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-wrap">
    <div class="container">

      <!-- top area reserved for background image details -->
      <div class="hero-space" aria-hidden="true"></div>

      <div class="form-box">
        <label for="fullName">Full Name</label>
        <input id="fullName" type="text" placeholder="Please type full name" />

        <label for="address">Address</label>
        <input id="address" type="text" placeholder="Enter address" />

        <label for="mobile">Mobile Number (WhatsApp)</label>
        <div class="phone-group">
          <select id="countryCode">
            <option value="+94" selected>🇱🇰 Sri Lanka (+94)</option>
            <option value="+91">🇮🇳 India (+91)</option>
            <option value="+1">🇺🇸 United States (+1)</option>
            <option value="+44">🇬🇧 United Kingdom (+44)</option>
            <option value="+61">🇦🇺 Australia (+61)</option>
            <option value="+971">🇦🇪 UAE (+971)</option>
            <option value="+966">🇸🇦 Saudi Arabia (+966)</option>
            <option value="+65">🇸🇬 Singapore (+65)</option>
            <option value="+81">🇯🇵 Japan (+81)</option>
            <option value="+49">🇩🇪 Germany (+49)</option>
            <option value="+33">🇫🇷 France (+33)</option>
            <option value="+39">🇮🇹 Italy (+39)</option>
            <option value="+7">🇷🇺 Russia (+7)</option>
            <option value="+86">🇨🇳 China (+86)</option>
            <option value="+27">🇿🇦 South Africa (+27)</option>
            <option value="+55">🇧🇷 Brazil (+55)</option>
            <option value="+234">🇳🇬 Nigeria (+234)</option>
            <option value="+351">🇵🇹 Portugal (+351)</option>
            <option value="+34">🇪🇸 Spain (+34)</option>
            <option value="+41">🇨🇭 Switzerland (+41)</option>
          </select>
          <input id="mobile" type="text" placeholder="Enter mobile number" />
        </div>

        <label for="email">Email</label>
        <input id="email" type="email" placeholder="example@email.com" />

        <label for="category">Award Category</label>
        <select id="category" onchange="toggleSections()">
          <option value="">Select category</option>
          <option value="plantation">Plantation Sector</option>
          <option value="sales">Sales Achiever</option>
          <option value="other">Other</option>
        </select>

        <div id="plantation" class="conditional">
          <label for="plantationCompany">Plantation Company Name</label>
          <input id="plantationCompany" type="text" placeholder="Enter company name" />
        </div>

        <div id="sales" class="conditional">
          <label for="salesCompany">Company Name</label>
          <input id="salesCompany" type="text" placeholder="Insurance or relevant company" />
        </div>

        <div id="other" class="conditional">
          <label for="otherType">Type</label>
          <select id="otherType">
            <option>Own Company</option>
            <option>Other</option>
          </select>

          <label for="otherCompany">Company Name</label>
          <input id="otherCompany" type="text" placeholder="Enter company name" />
        </div>

        <label for="comments">Comments</label>
        <textarea id="comments" rows="4" placeholder="Optional"></textarea>

        <button type="button" onclick="submitForm()">Submit Application</button>

        <div id="successMsg" class="success-msg"></div>
        <div id="contactMsg" class="contact-msg"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
